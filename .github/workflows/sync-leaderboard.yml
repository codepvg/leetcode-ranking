name: Sync Leaderboard Data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: daily-fetch
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  run-fetch:
    if: github.repository == 'codepvg/leetcode-ranking'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout logic repo
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: codepvg/leetcode-ranking-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: db-repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sync loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_ITERATIONS=72
          INTERVAL=300
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          CONSECUTIVE_FAILS=0
          ISSUE_CREATED=false

          for i in $(seq 1 $MAX_ITERATIONS); do
            echo "--- Iteration $i/$MAX_ITERATIONS ---"

            # 1. Pull latest changes (especially users.json) before starting
            cd db-repo
            git pull --rebase -q || true
            cd ..

            # 2. Run sync
            export DATA_DIR=db-repo
            export DATA_REPO_TOKEN=${{ secrets.DATA_REPO_TOKEN }}

            if node scripts/sync-leaderboard.js; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              CONSECUTIVE_FAILS=0
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
              echo "::error::Iteration $i failed (#$FAIL_COUNT total, $CONSECUTIVE_FAILS consecutive)"

              # Create a GitHub issue after 3 consecutive failures (once per run)
              if [ $CONSECUTIVE_FAILS -ge 3 ] && [ "$ISSUE_CREATED" = "false" ]; then
                ISSUE_CREATED=true
                gh issue create \
                  --title "⚠️ Sync workflow failing consistently" \
                  --label "type:devops" \
                  --body "The sync-leaderboard workflow has failed ${CONSECUTIVE_FAILS} consecutive times.

              Last attempt: Iteration $i / $MAX_ITERATIONS
              Timestamp: $(date -u)
              Total failures: $FAIL_COUNT

              Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              fi
            fi

            # 3. Stage changes (everything except users.json and inactive-users.json)
            cd db-repo
            git add .
            git reset -q users.json
            git reset -q inactive-users.json
            
            # Debug: show exactly what is staged
            echo "--- Git Status ---"
            git status
            echo "------------------"

            # 4. Commit and push normally if there are changes
            if ! git diff --staged --quiet; then
              SYNC_TIME=$(date -u +'%Y-%m-%d %H:%M')
              git commit -q -m "Sync: $SYNC_TIME"
              
              # Rebase again right before pushing in case a user registered during the script run
              git pull --rebase origin main -q || true
              
              git push -q
              echo "Stats updated and pushed."
            else
              echo "No new changes detected in the data directory."
            fi
            
            cd ..

            if [ $i -lt $MAX_ITERATIONS ]; then
              sleep $INTERVAL
            fi
          done

          # Final summary
          echo "=========================================="
          echo "Sync loop summary"
          echo "  Iterations: $MAX_ITERATIONS"
          echo "  Successful: $SUCCESS_COUNT"
          echo "  Failed:     $FAIL_COUNT"
          echo "=========================================="

          # Fail the step if any iteration failed
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "::error::$FAIL_COUNT out of $MAX_ITERATIONS iterations failed."
            exit 1
          fi
