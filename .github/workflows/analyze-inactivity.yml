name: Daily Inactivity Analysis

on:
  schedule:
    - cron: "0 0 * * *" # Triggers at 00:00 UTC every day
  workflow_dispatch: # Allows clicking a button in GitHub to test run it anytime

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          path: code-repo

      # Checks out the separate repository containing your user files and JSON assets
      - name: Checkout Data Repository
        uses: actions/checkout@v4
        with:
          repository: "codepvg/leetcode-ranking-data"
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "code-repo/package-lock.json"

      - name: Install Dependencies
        run: |
          cd code-repo
          npm install

      # Executes your new tracking file and safely maps its destination to the data path
      - name: Run Inactivity Analysis Script
        env:
          DATA_DIR: "${{ github.workspace }}/data-repo"
        run: |
          cd code-repo
          node scripts/analyze-inactivity.js

      # Stages, commits, and pushes the newly generated file directly back into the data repo
      - name: Commit and Push to Data Repo
        run: |
          cd data-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add inactive-users.json

          if git diff --staged --quiet; then
            echo "No changes detected in inactivity data."
          else
            git commit -m "chore: update daily inactive-users.json snapshot"
            git push
          fi
