<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Daily Leaderboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background-color: #fafafa; color: #333; }
        .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; font-size: 1.8rem; }
        #last-updated { color: #666; margin-bottom: 20px; font-size: 0.95rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eaeaea; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; font-weight: 600; color: #555; position: sticky; top: 0; }
        tr:hover { background-color: #f5f7fa; }
        .score { font-weight: bold; color: #2c7be5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Daily LeetCode Leaderboard</h1>
        <div id="last-updated">Last Updated: <span id="timestamp">Loading...</span></div>
        
        <table id="leaderboard">
            <thead>
                <tr><th>Rank</th><th>User</th><th>Easy</th><th>Medium</th><th>Hard</th><th>Score</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchLastUpdated();
            // Leaderboard rendering logic can be wired here
        });

        async function fetchLastUpdated() {
            const el = document.getElementById('timestamp');
            try {
                const response = await fetch('/api/last-updated');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                const timeStr = data.updatedAt || data.lastUpdated || data.timestamp;
                el.textContent = timeStr ? new Date(timeStr).toLocaleString() : 'Recently';
            } catch (err) {
                console.warn('Failed to fetch last updated time:', err);
                el.textContent = 'Unknown (Offline?)';
            }
        }
    </script>
</body>
</html>
