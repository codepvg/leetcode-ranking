<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background-color: #0f172a;
        color: #ffffff;
        font-family: sans-serif;
        padding: 40px;
        margin: 0;
      }
      .analytics-container {
        max-width: 900px;
        margin: 0 auto;
      }
      .button-group {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
      }
      .btn-filter {
        padding: 10px 20px;
        cursor: pointer;
        background-color: #334155;
        color: white;
        border: none;
        border-radius: 4px;
        transition: background-color 0.2s ease;
      }
      .btn-filter:hover {
        background-color: #475569; /* Smooth hover effect for better UX */
      }
      .chart-card {
        background-color: #1e293b;
        padding: 20px;
        border-radius: 8px;
        height: 400px;
        width:100%;
      }
      .charts-wrapper {
        display: flex !important;
        flex-direction: row !important;
        gap: 20px;
        align-items: stretch;
        width: 100%;
      }
      .chart-container {
        flex: 4;
        height: 400px;
        width: 100%;
      }
      .pie-chart-container {
        flex: 1;
        height: 300px;
      }
      @media (max-width: 768px) {
        .charts-wrapper {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="analytics-container">
      <h1 id="username-display">Performance Profile</h1>

      <div class="button-group">
        <button id="btn-weekly" class="btn-filter">Weekly</button>
        <button id="btn-monthly" class="btn-filter">Monthly</button>
        <button id="btn-overall" class="btn-filter">Overall</button>
      </div>
      <div class="charts-wrapper">
        <div class="chart-card">
          <canvas id="performanceChart"></canvas>
        </div>
        <div class="pie-chart-container">
          <canvas id="difficultyChart"></canvas>
        </div>
      </div>
    </div>
    <script src="/scripts/user-profile.js"></script>
  </body>
</html>
